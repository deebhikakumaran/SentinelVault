[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
solc    = "0.8.24"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/"
]

# ── Compiler optimisations ────────────────────────────────────────────────────
optimizer        = true
optimizer_runs   = 200
via_ir           = false

# ── RPC endpoints ─────────────────────────────────────────────────────────────
# Set the corresponding environment variables before running forge scripts.
# Recommended providers: Alchemy, Infura, or the public RPCs below.
#
#   Sepolia (public):       https://rpc.sepolia.org
#   Base Sepolia (public):  https://sepolia.base.org
[rpc_endpoints]
# ── Real testnets ──────────────────────────────────────────────────────────────
sepolia      = "${SEPOLIA_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

# ── Tenderly forks (CRE staging) ──────────────────────────────────────────────
tenderly_eth = "${TENDERLY_ETH_RPC}"
tenderly_arb = "${TENDERLY_ARB_RPC}"

# ── Etherscan / block-explorer API keys (for --verify) ────────────────────────
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
